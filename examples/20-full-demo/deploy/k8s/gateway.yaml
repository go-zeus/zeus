# Gateway Deployment + Service
# 同时充当流量入口和嵌入式服务注册中心
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeus-gateway
  namespace: zeus-demo
  labels:
    app: zeus-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zeus-gateway
  template:
    metadata:
      labels:
        app: zeus-gateway
    spec:
      containers:
        - name: gateway
          image: zeus-gateway:latest
          imagePullPolicy: Never  # 用本地构建的镜像（通过节点 docker load 注入）
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /api/services
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/services
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: zeus-demo
spec:
  selector:
    app: zeus-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
