# 前端 Deployment + Service（NodePort 暴露到宿主机）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeus-frontend
  namespace: zeus-demo
  labels: { app: zeus-frontend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: zeus-frontend }
  template:
    metadata:
      labels: { app: zeus-frontend }
    spec:
      containers:
        - name: frontend
          image: zeus-frontend:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 80 }]
          env:
            - { name: PORT, value: "80" }
            - { name: GATEWAY_URL, value: "http://gateway.zeus-demo.svc.cluster.local:8080" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: zeus-demo
spec:
  type: NodePort
  selector:
    app: zeus-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30088  # 访问：http://<minikube-ip>:30088
