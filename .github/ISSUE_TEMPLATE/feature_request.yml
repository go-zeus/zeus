name: 功能建议
description: 提出新功能或改进建议
title: "[feat] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 Zeus 提出建议！请先在 [Discussions - Ideas](https://github.com/go-zeus/zeus/discussions/categories/ideas) 讨论需求场景，达成共识后再开 Issue 进入正式评审流程。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决什么痛点？避免"我觉得应该有 X"，请从具体场景出发。
      placeholder: "在做 xxx 时，我需要 yyy，但目前 Zeus 没有 zzz，导致 ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望 API 长什么样？给出伪代码或示意用法。
      placeholder: |
        ```go
        cache.WithXXX(opt)
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 你是否考虑过其他实现方式？为什么不选它们？

  - type: dropdown
    id: layer
    attributes:
      label: 目标 API 层级
      description: 这个功能主要服务于哪一层用户？（参考 [4 层渐进暴露](https://github.com/go-zeus/zeus/blob/main/CLAUDE.md#4-层渐进暴露-api)）
      options:
        - L1 (app.Run 快速入口) - 5 行启动场景
        - L2 (Config 配置驱动) - 改配置即可
        - L3 (app.NewApp 类型装配) - 代码定制
        - L4 (components.NewApp) - 完全控制
        - plugins/* (第三方插件)
        - 跨层（影响多层）
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: 涉及功能域
      options:
        - app (应用入口)
        - server (HTTP/gRPC)
        - registry (注册中心)
        - balancer (负载均衡)
        - client (HTTP/gRPC 客户端)
        - proxy (反向代理)
        - middleware (中间件)
        - config (配置)
        - log (日志)
        - metrics / trace (可观测性)
        - database (数据库)
        - cache (缓存)
        - mq (消息队列)
        - job (任务调度)
        - routing / propagation (集群路由 / 上下文传播)
        - circuitbreaker / ratelimit / retry (治理)
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: design-check
    attributes:
      label: 设计哲学自检
      description: Zeus 的核心哲学是"内部复杂 + 外部简单"，请确认你的建议符合
      options:
        - label: 这个功能在用户不需要时可以被隐藏（不增加 L1/L2 用户认知负担）
          required: true
        - label: 不破坏现有 4 层 API 的层级约束（不越层泄漏概念）
          required: true
        - label: 主仓不引入第三方依赖（如需依赖应放 plugins/）
          required: true
